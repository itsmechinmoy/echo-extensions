name: Spotify Token Extractor
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  extract-tokens:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install puppeteer

    - name: Create extraction script
      run: |
        cat > extract_tokens.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');

        (async () => {
          const browser = await puppeteer.launch({
            headless: 'new',
            args: [
              '--no-sandbox',
              '--disable-setuid-sandbox',
              '--disable-dev-shm-usage',
              '--disable-accelerated-2d-canvas',
              '--no-first-run',
              '--no-zygote',
              '--disable-gpu'
            ]
          });

          const page = await browser.newPage();

          await page.setUserAgent(
            'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
          );

          let tokens = null;

          // --- Intercept Spotify's internal token/config requests ---
          await page.setRequestInterception(true);

          page.on('request', (req) => req.continue());

          page.on('response', async (response) => {
            if (tokens) return; // already found

            const url = response.url();

            // Spotify fetches client tokens from this endpoint
            const isTokenEndpoint =
              url.includes('clienttoken.spotify.com') ||
              url.includes('/api/token') ||
              url.includes('accounts.spotify.com/api/token');

            // Also watch the bootstrap/config JSON that contains secrets
            const isConfigEndpoint =
              url.includes('open.spotify.com/api/') ||
              url.includes('spclient.wg.spotify.com') ||
              url.includes('/v1/config');

            if (!isTokenEndpoint && !isConfigEndpoint) return;

            try {
              const contentType = response.headers()['content-type'] || '';
              if (!contentType.includes('json')) return;

              const body = await response.json().catch(() => null);
              if (!body) return;

              console.log(`[response] ${url}`);
              console.log(JSON.stringify(body, null, 2));

              // Spotify client token response shape:
              // { granted_token: { token, expires_after_seconds, ... } }
              // OR older shape: { accessToken, clientId, ... }
              if (body.granted_token?.token || body.accessToken || body.access_token) {
                tokens = body;
                console.log('TOKENS_FOUND: token response captured');
              }
            } catch (e) {
              // non-JSON or already-consumed body — skip
            }
          });

          // --- Also grab tokens injected into the page's __INITIAL_STATE__ / window ---
          await page.evaluateOnNewDocument(() => {
            // Spotify sometimes puts its bootstrap config on window.__spotify_*
            // or in a <script id="config"> tag. We poll for it after load.
            window.__tokenCapture = {};

            const _origFetch = window.fetch;
            window.fetch = async function (...args) {
              const res = await _origFetch(...args);
              const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || '';
              if (
                url.includes('clienttoken.spotify.com') ||
                url.includes('/api/token') ||
                url.includes('accounts.spotify.com')
              ) {
                const clone = res.clone();
                clone.json().then(data => {
                  window.__tokenCapture = data;
                  console.log('FETCH_TOKEN_FOUND:' + JSON.stringify(data));
                }).catch(() => {});
              }
              return res;
            };
          });

          // Listen for console messages from the page
          page.on('console', (msg) => {
            const text = msg.text();
            if (text.startsWith('FETCH_TOKEN_FOUND:')) {
              try {
                const data = JSON.parse(text.slice('FETCH_TOKEN_FOUND:'.length));
                if (!tokens) {
                  tokens = data;
                  console.log('Tokens captured via fetch intercept');
                }
              } catch (_) {}
            }
          });

          try {
            console.log('Navigating to Spotify...');
            await page.goto('https://open.spotify.com/', {
              waitUntil: 'networkidle2',
              timeout: 60000
            });

            // Give the page a moment to fire any deferred token fetches
            await new Promise(r => setTimeout(r, 5000));

            // Last-resort: scrape window state from the page
            if (!tokens) {
              tokens = await page.evaluate(() => {
                // Spotify sometimes embeds config in a <script> tag
                const scripts = Array.from(document.querySelectorAll('script'));
                for (const s of scripts) {
                  const text = s.textContent || '';
                  // Look for clientToken or accessToken patterns
                  const m = text.match(/"(?:clientToken|accessToken|client_token)"\s*:\s*"([^"]{20,})"/);
                  if (m) return { token: m[1], source: 'script_tag' };
                }

                // Try window properties
                for (const key of Object.keys(window)) {
                  if (key.toLowerCase().includes('token') || key.toLowerCase().includes('spotify')) {
                    try {
                      const val = window[key];
                      if (val && typeof val === 'object') return { ...val, source: key };
                    } catch (_) {}
                  }
                }

                // Try __tokenCapture set by our fetch hook
                if (window.__tokenCapture && Object.keys(window.__tokenCapture).length) {
                  return window.__tokenCapture;
                }

                return null;
              });
            }

            if (tokens) {
              fs.writeFileSync('spotify_tokens.json', JSON.stringify(tokens, null, 2));
              console.log('Tokens saved to spotify_tokens.json');
              process.exit(0);
            } else {
              console.error('No tokens found within timeout period');
              process.exit(1);
            }
          } catch (error) {
            console.error('Error:', error);
            process.exit(1);
          } finally {
            await browser.close();
          }
        })();
        EOF

    - name: Extract Spotify tokens
      id: extract
      run: node extract_tokens.js
      continue-on-error: true

    - name: Debug spotify_tokens.json
      if: success()
      run: |
        if [ -f "spotify_tokens.json" ]; then
          echo "✅ spotify_tokens.json contents:"
          cat spotify_tokens.json
          echo "🔍 Validating JSON with jq:"
          jq . spotify_tokens.json || echo "❌ Invalid JSON in spotify_tokens.json"
        else
          echo "❌ spotify_tokens.json not found"
          exit 1
        fi

    - name: Update noidea.txt with latest secret
      if: success()
      run: |
        if [ -f "spotify_tokens.json" ]; then
          if [ -f "noidea.txt" ]; then
            current_version=$(jq -r '.version // 0' noidea.txt)
          else
            current_version=0
          fi

          if jq . spotify_tokens.json >/dev/null 2>&1; then
            # Handle both nested (.secrets[]) and flat token shapes
            has_secrets=$(jq 'has("secrets")' spotify_tokens.json)

            if [ "$has_secrets" = "true" ]; then
              max_version=$(jq -r --argjson curr "$current_version" \
                '[.secrets[] | select(.version >= $curr)] | max_by(.version) | .version' \
                spotify_tokens.json)
              latest_secret=$(jq -r --argjson ver "$max_version" \
                '.secrets[] | select(.version == $ver) | .secret' \
                spotify_tokens.json)
              latest_version="$max_version"
            else
              # Flat shape — use token field directly, version = current+1
              latest_secret=$(jq -r '.granted_token.token // .accessToken // .access_token // .token // empty' spotify_tokens.json)
              latest_version=$((current_version + 1))
            fi

            if [ -n "$latest_secret" ] && [ "$latest_secret" != "null" ]; then
              jq -n --arg s "$latest_secret" --argjson v "$latest_version" \
                '{"secret": $s, "version": $v}' > noidea.txt
              echo "✅ Updated noidea.txt (version: $latest_version)"

              if git diff --quiet noidea.txt; then
                echo "ℹ️ No changes to noidea.txt, skipping commit"
              else
                git config --global user.name "GitHub Actions Bot"
                git config --global user.email "actions@github.com"
                git add noidea.txt
                git commit -m "Update noidea.txt with latest Spotify secret (version: $latest_version)"
                git push
              fi
            else
              echo "⚠️ Could not extract a secret from spotify_tokens.json"
              exit 1
            fi
          else
            echo "❌ Invalid JSON in spotify_tokens.json"
            exit 1
          fi
        else
          echo "❌ spotify_tokens.json not found"
          exit 1
        fi

    - name: Upload tokens as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: spotify-tokens
        path: spotify_tokens.json
        retention-days: 1

    - name: Display results
      run: |
        if [ -f "spotify_tokens.json" ]; then
          echo "✅ Tokens extracted successfully:"
          cat spotify_tokens.json
        else
          echo "❌ Token extraction failed"
          exit 1
        fi
        if [ -f "noidea.txt" ]; then
          echo "✅ Current noidea.txt contents:"
          cat noidea.txt
        fi
